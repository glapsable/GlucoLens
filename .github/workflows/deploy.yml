name: Deploy GlucoLens

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: yasmin255.mikrus.xyz
          port: 10255
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dist/*
          target: /var/www/glucolens
          strip_components: 1

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: yasmin255.mikrus.xyz
          port: 10255
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: nginx -s reload
